<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery — Enes Cilingir</title>

  <!-- Theme init: must run before paint to prevent flash -->
  <script>if(localStorage.getItem('theme')==='dark')document.documentElement.setAttribute('data-theme','dark');</script>

  <!-- Styles -->
  <link rel="stylesheet" href="css/tokens.css?v=2">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/base.css?v=1">
  <link rel="stylesheet" href="css/components/nav.css?v=10">
  <link rel="stylesheet" href="css/components/footer.css">
  <link rel="stylesheet" href="css/components/button.css">
  <link rel="stylesheet" href="css/pages/gallery.css?v=4">

  <link rel="preload" as="image" href="ASSETS/images/REACH/phone-bottom.jpg">
  <link rel="preload" as="image" href="ASSETS/images/REACH/reachlogo.jpg">
  <link rel="preload" as="image" href="ASSETS/images/COVERS/retarget-cover.jpg">
  <link rel="preload" as="image" href="ASSETS/images/RETARGET/mockups-secondary.png">
  <link rel="preload" as="image" href="ASSETS/images/RETARGET/logo-combination.png">
</head>
<body>
  <div class="page gallery">

    <!-- Nav -->
    <nav class="nav" data-nav-page="gallery"></nav>

    <!-- Main Content -->
    <main>
      <div class="gallery__grid">

        <!-- Item 1: Row 1, left -->
        <div class="gallery__item gallery__item--1">
          <img class="gallery__image" src="ASSETS/images/REACH/phone-bottom.jpg" alt="Reach app on phone">
        </div>

        <!-- Item 2: Row 1, right -->
        <div class="gallery__item gallery__item--2">
          <img class="gallery__image" src="ASSETS/images/REACH/reachlogo.jpg" alt="Reach project logo">
        </div>

        <!-- Item 3: Row 2, left (tall, spans 2 rows) — was 5 after AIDEA row removed -->
        <div class="gallery__item gallery__item--3">
          <img class="gallery__image" src="ASSETS/images/COVERS/retarget-cover.jpg" alt="Retarget project cover">
        </div>

        <!-- Item 4: Row 2, right top -->
        <div class="gallery__item gallery__item--4">
          <img class="gallery__image" src="ASSETS/images/RETARGET/mockups-secondary.png" alt="Retarget project mockups">
        </div>

        <!-- Item 5: Row 3, right bottom -->
        <div class="gallery__item gallery__item--5">
          <img class="gallery__image" src="ASSETS/images/RETARGET/logo-combination.png" alt="Retarget logo combinations">
        </div>

      </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <span class="footer__copyright">&copy; 2026 Enes Cilingir</span>
      <a href="imprint.html" class="footer__link">Imprint</a>
    </footer>

  </div>

  <script src="ASSETS/js/nav.js?v=4"></script>
  <script src="ASSETS/js/theme.js"></script>
  <script src="ASSETS/js/copy-mail.js"></script>
  <script src="https://unpkg.com/lenis@1.1.20/dist/lenis.min.js"></script>
  <script src="ASSETS/js/smooth-scroll.js"></script>
</body>
</html>
